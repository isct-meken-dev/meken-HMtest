          <h2 class="about-headline">What we can do?</h2>
            <p class ="about-discription">
              Animeken.titech is a web application that allows users to search for anime information, including titles, synopses, and images. It provides a user-friendly interface for anime enthusiasts to explore and discover new anime series.

              Users can enter keywords related to anime titles or genres, and the application will retrieve relevant information from a database. The search results may include details such as the anime's title, synopsis, release date, and an image associated with the anime.
